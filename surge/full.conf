🔀 中转 = select,📱 蜂窝流量,📶 中转网卡,DIRECT
📱 蜂窝流量 = select,CELLULAR-ONLY,hidden=true
代理节点 = select,policy-path=https://example.invalid/PROXY_SURGE_URL,hidden=true,external-policy-modifier="underlying-proxy=🔀 中转,interface=en0,allow-other-interface=false,dns-follow-interface=true"
🚀 默认 = select,♻️ 自动,🔁 故障转移,⚖️ 负载均衡,🚀 手动,🇭🇰 香港,🇹🇼 台湾,🇸🇬 新加坡,🇯🇵 日本,🇺🇲 美国,🇩🇪 德国,🇬🇧 英国,🇦🇺 澳洲,🇨🇳 中国,🕹️ 游戏,DIRECT
