name: Update Shadowrocket Config

on:
  workflow_dispatch:
  schedule:
    - cron: "20 20 * * *"

permissions:
  contents: write

concurrency:
  group: update-shadowrocket-config
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate Shadowrocket config
        run: python3 scripts/generate_shadowrocket.py --refresh-rules

      - name: Commit changes
        run: |
          git add shadowrocket/full.conf shadowrocket/rules
          if git diff --cached --quiet; then
            echo "No Shadowrocket config changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Shadowrocket config"
          git push
