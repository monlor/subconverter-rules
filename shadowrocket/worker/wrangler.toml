name = "shadowrocket-sub"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[vars]
BASE_CONFIG_URL = "https://raw.githubusercontent.com/monlor/subconverter-rules/main/shadowrocket/full.conf"

# KV namespace for subscription caching (fallback when upstream is unreachable)
# Create with: npx wrangler kv namespace create "CACHE"
# Then fill in the returned id below.
[[kv_namespaces]]
binding = "CACHE"
id = "1e686b94c7b94e83ab1deca347347ded"

# Configure secrets via `wrangler secret put`:
#   SECRET_KEY   - authentication key for ?key= URL parameter
#   PROXY_SUBS   - comma-separated proxy subscription URLs
#   RELAY_SUBS   - comma-separated relay subscription URLs
